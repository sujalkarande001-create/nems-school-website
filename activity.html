<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Details | New English Medium School</title>
    <meta name="description" content="Activity and event details from New English Medium School, Sambhaji Nagar, Kolhapur." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="top-strip">
      <div class="container top-strip__inner">
        <span>Sambhaji Nagar, Kolhapur</span>
        <a href="tel:+912312629934">0231-2629934</a>
      </div>
    </header>

    <nav class="site-header" aria-label="Main navigation">
      <a class="brand" href="index.html">
        <img src="assets/school-logo.png" alt="New English Medium School logo" />
        <span>
          <strong>New English Medium School</strong>
          <small>Sambhaji Nagar, Kolhapur</small>
        </span>
      </a>
      <div class="nav-links nav-links--static">
        <a href="index.html#activities">Back to Activities</a>
        <a href="index.html#admission">Admission</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </nav>

    <main>
      <section class="activity-detail-hero">
        <div class="container activity-detail-hero__grid">
          <div>
            <p class="tagline" id="activity-kicker">School activity</p>
            <h1 id="activity-title">Activity</h1>
            <p id="activity-description"></p>
            <a class="btn btn--primary" href="index.html#activities">View all activities</a>
          </div>
          <div class="activity-slider" aria-label="Activity photos">
            <img id="activity-slide-image" alt="School activity photo" />
            <div class="activity-slider__caption">
              <strong id="activity-slide-caption">Activity photo</strong>
            </div>
            <div class="activity-slider__controls">
              <button type="button" id="activity-prev" aria-label="Previous photo">&lt;</button>
              <button type="button" id="activity-next" aria-label="Next photo">&gt;</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <span>New English Medium School, Sambhaji Nagar, Kolhapur</span>
        <span>&copy; 2026 All rights reserved.</span>
      </div>
    </footer>

    <script src="activity.js"></script>
  </body>
</html>
